<svg
  width="500"
  height="200"
  viewBox="0 0 500 200"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
>

  <!-- Cubic Bezier curve -->
  <path
    id="bezierCurve"
    d="M 50 120 C 150 20, 350 20, 450 120"
    fill="none"
    stroke="#cccccc"
    stroke-width="2"
  />

  <!-- Text on the curve -->
  <text
    font-family="Arial"
    font-size="32"
    fill="black"
  >
    <textPath
      xlink:href="#bezierCurve"
      startOffset="50%"
      text-anchor="middle"
    >
      TEST TEXT
    </textPath>
  </text>

</svg>
