<?xml version="1.0" encoding="UTF-8" standalone="no"?>
            <svg
                width="500px"
                height="500px"
                viewBox="0 0 500 500"
                version="1.1"
                xmlns="http://www.w3.org/2000/svg"
                xmlns:xlink="http://www.w3.org/1999/xlink">

              <g id="layer1">

                <!-- ================== BEZIERS ================== -->

                <path
                  id="long_test_bezier"
                  d="m 50,250 c 0,0 0,0 400,0"
                  style="fill:none;stroke:#000;stroke-width:0.3"/>

                <!-- ================== WORD 1 ================== -->

                <g
                  data-bezier-ref="long_test_bezier"
                  data-text="Irgerstetten">
            
                  <text
                    style="font-size:7px;font-family:font6;text-anchor:middle;fill:#000">
                    <textPath
                      xlink:href="#long_test_bezier"
                      startOffset="50%">
                      <tspan>Irgerstetten</tspan>
                    </textPath>
                  </text>
                </g>
              </g>
            </svg>
        